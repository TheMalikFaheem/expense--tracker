<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundFlow | Personal Expense Tracker</title>
    <meta name="description" content="A beautiful glassmorphism personal expense tracker">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container">
        <header>
            <h1>FundFlow</h1>
            <p>Your beautiful personal finance tracker</p>
        </header>

        <main>
            <section class="summary-cards">
                <div class="card glass">
                    <h3>Total Balance</h3>
                    <h2 id="total-balance">$0.00</h2>
                </div>
                <div class="card glass income-card">
                    <h3>Income</h3>
                    <h2 id="total-income">+$0.00</h2>
                </div>
                <div class="card glass expense-card">
                    <h3>Expense</h3>
                    <h2 id="total-expense">-$0.00</h2>
                </div>
            </section>

            <div class="grid-layout">
                <section class="add-transaction glass">
                    <h3>Add New Transaction</h3>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="description">Title / Description</label>
                            <input type="text" id="description" placeholder="e.g. Groceries" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount ($)</label>
                            <input type="number" id="amount" step="0.01" min="0.01" placeholder="e.g. 50.00" required>
                        </div>
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" required>
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="Food">Food & Dining</option>
                                <option value="Travel">Travel</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Salary">Salary</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                </section>

                <section class="transaction-history glass">
                    <h3>Recent Transactions</h3>
                    <ul id="transaction-list">
                        <!-- Transactions will be injected here via JS -->
                        <div class="loading">Loading...</div>
                    </ul>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
